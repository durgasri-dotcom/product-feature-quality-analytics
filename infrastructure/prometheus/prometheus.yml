# 15s scrape interval — balances metric resolution against storage overhead
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "analytics_pipeline"
    static_configs:
      - targets: ["pipeline:8000"]
    metrics_path: "/metrics"
