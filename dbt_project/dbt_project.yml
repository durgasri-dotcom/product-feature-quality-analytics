name: "feature_quality_analytics"
description: "Transforms raw feature telemetry into Bronze/Silver/Gold layers using DuckDB"
version: "1.0.0"
config-version: 2

profile: "feature_quality_analytics"

# Paths where model SQL files live
model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

# Output folder
target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Model configuration by layer
models:
  feature_quality_analytics:
    # Bronze layer = raw data, materialized as views (fast, no storage)
    bronze:
      +materialized: view
      +schema: bronze
      +tags: ["bronze", "raw"]

    # Silver layer = cleaned data, materialized as tables (stored)
    silver:
      +materialized: table
      +schema: silver
      +tags: ["silver", "cleaned"]

    # Gold layer = business-ready, materialized as tables
    gold:
      +materialized: table
      +schema: gold
      +tags: ["gold", "analytics"]
